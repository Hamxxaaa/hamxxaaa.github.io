<style>

}

.progress{
height:100%;
width:0%;
background:#e50914;
transition:width 0.3s linear;
}

.continue-btn{
display:inline-block;
padding:12px 25px;
background:#e50914;
color:white;

text-decoration:none;

}

.continue-btn:hover{
background:#ff1f1f;
transform:scale(1.05);
}

.device{
margin-top:15px;
font-size:12px;
opacity:0.5;
}

<div class="logo">ENJOY YOUR FAVORITE MOVIE!</div>

<div class="loading-text">
Preparing your video... Please wait
</div>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<!-- CONTINUE BUTTON (PUT MONETAG LINK HERE) -->
<a class="continue-btn" 
href="YOUR_MONETAG_LINK_HERE" 
target="_blank">
Continue to Player
</a>

<div class="device" id="device"></div>

</div>

<script>
// MOBILE DETECTION
const device = document.getElementById("device");
if(/Mobi|Android|iPhone/i.test(navigator.userAgent)){
    device.innerHTML = "Mobile device detected 📱";
}else{
    device.innerHTML = "Desktop device detected 🖥️";
}

// PROGRESS BAR
let progress = document.getElementById("progress");
let width = 0;
let interval = setInterval(function(){
    width += 1;
    progress.style.width = width + "%";
    if(width >= 100) clearInterval(interval);
}, 100);

// AUTO REDIRECT AFTER 10s
const urlParams = new URLSearchParams(window.location.search);
let video = urlParams.get('video');
if(video) video = decodeURIComponent(video); // decode URL safely

setTimeout(function(){
    if(video) {
        window.location.href = video;
    } else {
        alert("No video found!");
    }
}, 10000);
</script>
